commit-msg:
  commands:
    commitlint:
      run: commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    nixfmt:
      glob: "*.nix"
      run: bash -c 'mapfile -t files < <(git ls-files "*.nix"); ((${#files[@]} == 0)) || nixfmt --check "${files[@]}"'
    statix:
      glob: "*.nix"
      run: statix check .
    deadnix:
      glob: "*.nix"
      run: deadnix --fail .
    ls-lint:
      run: ls_lint
